kind = "web"
previewPath = "/"
title = "Unit Converter"
version = "1.0.0"
id = "artifacts/unit-converter"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23123

[services.development]
run = "pnpm --filter @workspace/unit-converter run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/unit-converter", "run", "build" ]
publicDir = "artifacts/unit-converter/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23123"
BASE_PATH = "/"
